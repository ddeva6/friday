name: Daily Data Refresh

on:
  schedule:
    # 11:15 UTC = 4:45 PM IST (after NSE market close at 3:30 PM)
    - cron: '15 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "refresh"
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas pyyaml requests numpy jsonschema
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install chronos-forecasting

      - name: Configure dates
        run: |
          python3 -c "
          import yaml
          from datetime import datetime, timedelta
          end = datetime.now().strftime('%Y-%m-%d')
          start = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')
          config = {
              'database': {'path': 'friday.db'},
              'dates': {'start': start, 'end': end},
              'forecast': {'lookback': 180, 'horizon': 1, 'sample_count': 50, 'model': 'amazon/chronos-t5-tiny', 'seed': 42, 'use_log_returns': True, 'ensemble_lookbacks': [90, 180, 365], 'adaptive_lookback': True},
              'backtest': {'step': 5}
          }
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f)
          print(f'Config: {start} to {end}')
          "

      - name: Fetch EOD data (Phase 1)
        run: python -c "from fetch_eod import run_fetcher; run_fetcher()"

      - name: Generate forecasts (Phase 2 — CPU with tiny model)
        run: python -c "from forecast_batch import run_forecast_batch; run_forecast_batch()"

      - name: Export JSON (Phase 3)
        run: python -c "from export_json import export_data; export_data()"

      - name: Commit and push data
        run: |
          git config user.name "FRIDAY Bot"
          git config user.email "friday-bot@users.noreply.github.com"
          git add data/ config.yaml
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update data + forecasts $(date +%Y-%m-%d)" && git push)

  deploy:
    needs: refresh
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir _site
          cp friday-forecast-terminal.html _site/index.html
          cp -r data _site/data 2>/dev/null || echo "No data dir yet"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
