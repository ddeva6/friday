name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas pytest pyyaml requests jsonschema numpy
    - name: Run offline unit tests
      run: pytest test_phase1.py test_phase2.py test_phase3.py test_backtest.py -m "not integration" -v
